<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)" />
  <!-- Molecule structure (benzene ring) -->
  <polygon points="100,40 140,60 140,100 100,120 60,100 60,60" fill="none" stroke="white" stroke-width="3"/>
  <!-- Bonds extending out -->
  <line x1="100" y1="40" x2="100" y2="25" stroke="white" stroke-width="2.5"/>
  <line x1="140" y1="60" x2="155" y2="52" stroke="white" stroke-width="2.5"/>
  <line x1="140" y1="100" x2="155" y2="108" stroke="white" stroke-width="2.5"/>
  <line x1="100" y1="120" x2="100" y2="135" stroke="white" stroke-width="2.5"/>
  <line x1="60" y1="100" x2="45" y2="108" stroke="white" stroke-width="2.5"/>
  <line x1="60" y1="60" x2="45" y2="52" stroke="white" stroke-width="2.5"/>
  <!-- Atom dots -->
  <circle cx="100" cy="25" r="4" fill="#4ade80"/>
  <circle cx="155" cy="52" r="4" fill="#60a5fa"/>
  <circle cx="155" cy="108" r="4" fill="#f472b6"/>
  <circle cx="100" cy="135" r="4" fill="#4ade80"/>
  <circle cx="45" cy="108" r="4" fill="#60a5fa"/>
  <circle cx="45" cy="52" r="4" fill="#f472b6"/>
  <!-- DNA helix hint -->
  <path d="M 75,140 Q 100,155 125,140" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <path d="M 75,150 Q 100,165 125,150" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="85" y1="143" x2="85" y2="152" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="147" x2="100" y2="156" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="115" y1="143" x2="115" y2="152" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Apple chip icon hint -->
  <rect x="78" y="160" width="44" height="25" rx="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <text x="100" y="177" text-anchor="middle" fill="white" font-size="10" font-family="monospace" opacity="0.8">M4</text>
</svg>
