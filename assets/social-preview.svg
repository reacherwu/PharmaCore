<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Molecule structure (left side, decorative) -->
  <g transform="translate(150, 280)" opacity="0.6" filter="url(#glow)">
    <!-- Benzene ring -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="#667eea" stroke-width="2"/>
    <!-- Bonds -->
    <line x1="0" y1="-50" x2="0" y2="-80" stroke="#667eea" stroke-width="1.5"/>
    <line x1="43" y1="-25" x2="73" y2="-40" stroke="#667eea" stroke-width="1.5"/>
    <line x1="43" y1="25" x2="73" y2="40" stroke="#667eea" stroke-width="1.5"/>
    <line x1="0" y1="50" x2="0" y2="80" stroke="#667eea" stroke-width="1.5"/>
    <line x1="-43" y1="25" x2="-73" y2="40" stroke="#667eea" stroke-width="1.5"/>
    <line x1="-43" y1="-25" x2="-73" y2="-40" stroke="#667eea" stroke-width="1.5"/>
    <!-- Atoms -->
    <circle cx="0" cy="-80" r="5" fill="#4ade80"/>
    <circle cx="73" cy="-40" r="5" fill="#60a5fa"/>
    <circle cx="73" cy="40" r="5" fill="#f472b6"/>
    <circle cx="0" cy="80" r="5" fill="#4ade80"/>
    <circle cx="-73" cy="40" r="5" fill="#60a5fa"/>
    <circle cx="-73" cy="-40" r="5" fill="#f472b6"/>
    <!-- Second ring -->
    <line x1="73" y1="40" x2="120" y2="40" stroke="#667eea" stroke-width="1.5"/>
    <polygon points="120,40 150,20 180,40 180,70 150,90 120,70" fill="none" stroke="#764ba2" stroke-width="1.5"/>
  </g>

  <!-- DNA helix (right side, decorative) -->
  <g transform="translate(1050, 200)" opacity="0.4">
    <path d="M 0,0 Q 40,30 0,60 Q -40,90 0,120 Q 40,150 0,180 Q -40,210 0,240" fill="none" stroke="#667eea" stroke-width="2"/>
    <path d="M 0,0 Q -40,30 0,60 Q 40,90 0,120 Q -40,150 0,180 Q 40,210 0,240" fill="none" stroke="#764ba2" stroke-width="2"/>
    <!-- Rungs -->
    <line x1="-20" y1="30" x2="20" y2="30" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="60" x2="25" y2="60" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="90" x2="20" y2="90" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="120" x2="25" y2="120" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="150" x2="20" y2="150" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-25" y1="180" x2="25" y2="180" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="210" x2="20" y2="210" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="640" y="220" text-anchor="middle" fill="white" font-size="72" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">PharmaCore</text>

  <!-- Gradient underline -->
  <rect x="440" y="240" width="400" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="640" y="300" text-anchor="middle" fill="#a0aec0" font-size="28" font-family="system-ui, -apple-system, sans-serif">AI Drug Discovery on Apple Silicon</text>

  <!-- Key features -->
  <text x="640" y="370" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="system-ui, -apple-system, sans-serif">🧬 De Novo Generation  •  💊 Drug Repurposing  •  🔒 100% Local  •  📋 Fully Auditable</text>

  <!-- Stats boxes -->
  <g transform="translate(290, 420)">
    <rect width="160" height="80" rx="8" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <text x="80" y="35" text-anchor="middle" fill="#667eea" font-size="24" font-family="monospace" font-weight="bold">&lt;8s</text>
    <text x="80" y="60" text-anchor="middle" fill="#a0aec0" font-size="13" font-family="system-ui, sans-serif">Drug Generation</text>
  </g>
  <g transform="translate(490, 420)">
    <rect width="160" height="80" rx="8" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <text x="80" y="35" text-anchor="middle" fill="#4ade80" font-size="24" font-family="monospace" font-weight="bold">97.3%</text>
    <text x="80" y="60" text-anchor="middle" fill="#a0aec0" font-size="13" font-family="system-ui, sans-serif">Quality Retention</text>
  </g>
  <g transform="translate(690, 420)">
    <rect width="160" height="80" rx="8" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
    <text x="80" y="35" text-anchor="middle" fill="#f472b6" font-size="24" font-family="monospace" font-weight="bold">50%</text>
    <text x="80" y="60" text-anchor="middle" fill="#a0aec0" font-size="13" font-family="system-ui, sans-serif">Sparse Models</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1280" height="80" fill="black" fill-opacity="0.3"/>
  <text x="640" y="608" text-anchor="middle" fill="#718096" font-size="16" font-family="system-ui, sans-serif">No cloud GPUs needed  •  No data leaves your machine  •  Runs on M1/M2/M3/M4 Mac</text>

  <!-- Apple logo hint -->
  <text x="1200" y="608" text-anchor="middle" fill="white" font-size="24" opacity="0.6">&#xF8FF;</text>
</svg>
